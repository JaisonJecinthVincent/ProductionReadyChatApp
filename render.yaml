services:
  - type: web
    name: productionreadychatapp
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ELASTICSEARCH_ENABLED
        value: "true"
      - key: ELASTICSEARCH_URL
        sync: false
      - key: ELASTICSEARCH_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: QUEUE_ADMIN_KEY
        generateValue: true
